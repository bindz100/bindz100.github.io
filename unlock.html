<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Xác minh KEY</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: sans-serif;
      text-align: center;
      padding-top: 100px;
    }
  </style>
</head>
<body>
  <h2>Đang xác minh key từ Shortcuts...</h2>

  <script>
    const keyHash = location.hash.replace("#key=", "").trim();
    const correctKey = "BINDZ-24H--shjwi188cbakajdb";

    if (keyHash === correctKey) {
      // Lưu trạng thái mở khóa vào localStorage
      localStorage.setItem("access_granted", "true");
      // Chuyển sang index.html
      window.location.href = "index.html";
    } else {
      document.body.innerHTML = "<h1>❌ Key sai hoặc chưa nhập đúng từ Shortcuts!</h1>";
      localStorage.removeItem("access_granted");
    }
  </script>
</body>
</html>
