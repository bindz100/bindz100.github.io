<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VIP Start Page</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Rubik Mono One', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fff;
      position: relative;
      overflow: hidden;
      background: linear-gradient(270deg, #0f2027, #203a43, #2c5364);
      background-size: 600% 600%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Hiệu ứng sóng ánh sáng chạy ngang */
    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        45deg,
        rgba(0,255,255,0.05),
        rgba(0,255,255,0.05) 2px,
        transparent 2px,
        transparent 6px
      );
      animation: moveOverlay 10s linear infinite;
    }

    @keyframes moveOverlay {
      0% { background-position: 0 0; }
      100% { background-position: 100% 0; }
    }

    .start-btn {
      padding: 18px 36px;
      font-size: 20px;
      border: 2px solid #00ffe0;
      border-radius: 15px;
      background: rgba(0,255,255,0.1);
      color: #00ffe0;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0,255,255,0.5);
      text-shadow: 0 0 10px #00ffff;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease-in-out;
      z-index: 1;
    }

    .start-btn::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, #00ffe0, transparent, #00ffff, transparent, #00ffe0);
      animation: spin 3s linear infinite;
      z-index: -1;
      filter: blur(10px);
    }

    .start-btn:hover {
      background: rgba(0,255,255,0.3);
      color: #fff;
      box-shadow: 0 0 30px #00ffe0;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .vip-input {
      margin-top: 30px;
      padding: 16px;
      font-size: 18px;
      border: 2px solid transparent;
      border-radius: 12px;
      background: #101e2a;
      color: #00ffe0;
      box-shadow: 0 0 20px rgba(0,255,255,0.3);
      outline: none;
      text-align: center;
      width: 280px;
      font-family: 'Rubik Mono One', sans-serif;
      background-image: linear-gradient(#101e2a, #101e2a),
        linear-gradient(135deg, #00ffe0, #00ffff, #00ffe0);
      background-origin: border-box;
      background-clip: padding-box, border-box;
      animation: borderPulse 4s linear infinite;
      z-index: 1;
    }

    @keyframes borderPulse {
      0% { box-shadow: 0 0 10px #00ffe0; }
      50% { box-shadow: 0 0 25px #00ffff; }
      100% { box-shadow: 0 0 10px #00ffe0; }
    }
  </style>
</head>
<body>

  <div class="overlay"></div>

  <button class="start-btn">Start 🗿</button>
  <input type="text" class="vip-input" placeholder="Nhập nội dung VIP..."/>

</body>
</html>
