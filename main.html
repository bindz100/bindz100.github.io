<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>ChatGPT Mini Bot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #121212;
      color: #fff;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .msg { margin-bottom: 12px; }
    .user { color: #00f0ff; }
    .bot { color: #00ff88; }
    #form {
      display: flex;
      padding: 10px;
      background: #1f1f1f;
    }
    #input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border: none;
      border-radius: 4px;
    }
    #send {
      padding: 10px 20px;
      font-size: 16px;
      background: #00ff88;
      border: none;
      border-radius: 4px;
      margin-left: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<form id="form">
  <input type="text" id="input" placeholder="Nhập câu hỏi..." autocomplete="off" />
  <button type="submit" id="send">Gửi</button>
</form>

<script>
const apiKey = "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"; // ❗️Thay key của bạn tại đây (nguy hiểm nếu public)

const chat = document.getElementById("chat");
const form = document.getElementById("form");
const input = document.getElementById("input");

form.onsubmit = async (e) => {
  e.preventDefault();
  const userText = input.value.trim();
  if (!userText) return;

  addMessage("Bạn", userText, "user");
  input.value = "";
  addMessage("Bot", "Đang trả lời...", "bot", true);

  const response = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + apiKey
    },
    body: JSON.stringify({
      model: "gpt-3.5-turbo",
      messages: [{ role: "user", content: userText }],
      temperature: 0.7
    })
  });

  const data = await response.json();
  const botReply = data.choices?.[0]?.message?.content || "❌ Lỗi khi phản hồi!";
  removeTyping();
  addMessage("Bot", botReply, "bot");
};

function addMessage(sender, text, cls, isTyping = false) {
  const msg = document.createElement("div");
  msg.className = "msg " + cls;
  msg.innerHTML = `<b>${sender}:</b> ${text}`;
  msg.dataset.typing = isTyping ? "true" : "false";
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const msgs = chat.querySelectorAll('[data-typing="true"]');
  msgs.forEach(m => m.remove());
}
</script>

</body>
</html>
