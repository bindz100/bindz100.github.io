<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bindz Start VIP</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Rubik Mono One', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(270deg, #0f2027, #203a43, #2c5364);
      background-size: 800% 800%;
      animation: bgFlow 20s ease infinite;
      color: white;
    }

    @keyframes bgFlow {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .vip-input {
      border: 3px solid #00ffe0;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 18px;
      background: rgba(0,0,0,0.3);
      color: #fff;
      outline: none;
      animation: glowBorder 2s infinite ease-in-out;
      margin-top: 20px;
      width: 260px;
      text-align: center;
    }

    @keyframes glowBorder {
      0%, 100% { box-shadow: 0 0 10px #00ffe0; }
      50% { box-shadow: 0 0 20px #00ffff; }
    }

    .start-btn {
      margin-top: 30px;
      padding: 16px 32px;
      font-size: 20px;
      border-radius: 12px;
      background: linear-gradient(45deg, #00ffe0, #00bcd4);
      border: none;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      animation: pulseGlow 2.5s infinite;
      transition: transform 0.2s;
    }

    .start-btn:hover {
      transform: scale(1.1);
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 15px #00ffe0; }
      50% { box-shadow: 0 0 25px #00ffff; }
    }

    .result {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-top: 30px;
    }

    .result h2 {
      font-size: 22px;
      color: #00ffe0;
      animation: pulseText 2s ease-in-out infinite;
      margin-bottom: 20px;
    }

    @keyframes pulseText {
      0%, 100% { text-shadow: 0 0 8px #00ffe0; }
      50% { text-shadow: 0 0 18px #00ffff; }
    }

    .key {
      font-size: 18px;
      padding: 12px 20px;
      border: 2px dashed #00ffe0;
      border-radius: 12px;
      background: rgba(0,255,255,0.1);
      margin-bottom: 15px;
      text-shadow: 0 0 5px #00ffff;
    }

    .copy-btn {
      font-size: 16px;
      padding: 10px 24px;
      border: 2px solid #00ffe0;
      border-radius: 10px;
      background: rgba(0,255,255,0.1);
      color: #00ffe0;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(0,255,255,0.4);
    }

    .copy-btn:hover {
      background: rgba(0,255,255,0.25);
      color: #fff;
      box-shadow: 0 0 20px #00ffe0;
    }
  </style>
</head>
<body>

  <h1 class="title">🚀 Bindz Script Loader</h1>

  <input type="text" class="vip-input" placeholder="Ghi gì đó vào đây..." id="inputBox" />
  <button class="start-btn" onclick="runUserScript()" id="startBtn">Start 🗿</button>

  <div class="result" id="resultBox">
    <h2>✅ UserScript đã được chạy!</h2>
    <div class="key" id="keyText">BINDZ-24H--shjwi188cbakajdb</div>
    <button class="copy-btn" onclick="copyKey()">📋 Copy Key</button>
  </div>

  <script>
    function runUserScript() {
      // Ẩn Start và input
      document.getElementById("startBtn").style.display = "none";
      document.getElementById("inputBox").style.display = "none";

      // Tải script
      const script = document.createElement("script");
      script.src = "https://api2.adbypass.org/userscript/download/bypass.user.js";
      script.onload = () => {
        document.getElementById("resultBox").style.display = "flex";
      };
      script.onerror = () => {
        alert("❌ Tải thất bại!");
      };
      document.body.appendChild(script);
    }

    function copyKey() {
      const key = document.getElementById("keyText").innerText;
      navigator.clipboard.writeText(key).then(() => {
        alert("✅ Đã sao chép key!");
      }).catch(() => {
        alert("⚠️ Không thể sao chép.");
      });
    }
  </script>

</body>
</html>
