<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bindz Start VIP</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Rubik Mono One', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(270deg, #0f2027, #203a43, #2c5364);
      background-size: 600% 600%;
      animation: gradientBG 15s ease infinite;
      color: white;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .vip-input {
      border: 3px solid #00ffe0;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 18px;
      background: rgba(0,0,0,0.3);
      color: #fff;
      outline: none;
      animation: glowBorder 2s infinite ease-in-out;
      margin-top: 20px;
      width: 260px;
      text-align: center;
    }

    @keyframes glowBorder {
      0%, 100% { box-shadow: 0 0 10px #00ffe0; }
      50% { box-shadow: 0 0 20px #00ffff; }
    }

    .start-btn {
      margin-top: 40px;
      padding: 16px 32px;
      font-size: 20px;
      border-radius: 12px;
      background: linear-gradient(45deg, #00ffe0, #00bcd4);
      border: none;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      animation: pulseGlow 2.5s infinite;
      transition: transform 0.2s;
    }

    .start-btn:hover {
      transform: scale(1.1);
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 15px #00ffe0; }
      50% { box-shadow: 0 0 25px #00ffff; }
    }
  </style>
</head>
<body>

  <h1>🚀 Bắt đầu Bindz VIP</h1>
  <input type="text" class="vip-input" placeholder="Ghi gì đó vào đây..." />

  <button class="start-btn" onclick="runUserScript()">Start 🗿</button>

  <script>
    function runUserScript() {
      const script = document.createElement("script");
      script.src = "https://api2.adbypass.org/userscript/download/bypass.user.js";
      script.onload = () => {
        alert("✅ Đã tải và chạy UserScript!");
      };
      script.onerror = () => {
        alert("❌ Tải UserScript thất bại.");
      };
      document.body.appendChild(script);
    }
  </script>
</body>
</html>
