<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome to Bindz</title>
  <style>
    /* Nền xanh mây nhẹ với chuyển động gradient */
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(-45deg, #a1c4fd, #c2e9fb, #a1c4fd, #c2e9fb);
      background-size: 400% 400%;
      animation: cloudBG 20s ease infinite;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    @keyframes cloudBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .welcome-text {
      font-size: 3em;
      color: #ffffff;
      text-shadow:
        0 0 5px #fff,
        0 0 10px #9cf,
        0 0 20px #9cf;
      opacity: 0;
      animation: fadeInUp 1.8s ease forwards;
    }

    .to-bindz-text {
      font-size: 2.5em;
      color: #ffffff;
      text-shadow:
        0 0 5px #fff,
        0 0 10px #aaf,
        0 0 20px #aaf;
      opacity: 0;
      animation: fadeInUp 2s ease forwards;
      animation-delay: 2s;
    }

    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="welcome-text">Welcome</div>
  <div class="to-bindz-text">To Bindz</div>
</body>
</html>
