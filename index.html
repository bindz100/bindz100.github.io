<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome to Bindz</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(to top, #a8edea, #fed6e3);
      background-size: 400% 400%;
      animation: cloudBG 20s ease infinite;
      font-family: 'Playfair Display', serif;
      overflow: hidden;
    }

    @keyframes cloudBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .cloud {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      opacity: 0.4;
      animation: floatClouds 60s linear infinite;
    }

    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: #fff;
      border-radius: 50%;
    }

    .cloud1 { width: 200px; height: 60px; top: 100px; left: -250px; animation-delay: 0s; }
    .cloud2 { width: 150px; height: 50px; top: 200px; left: -200px; animation-delay: 20s; }
    .cloud3 { width: 250px; height: 70px; top: 300px; left: -300px; animation-delay: 40s; }

    .cloud::before { width: 100px; height: 100px; top: -25px; left: 25px; }
    .cloud::after { width: 120px; height: 120px; top: -40px; left: 90px; }

    @keyframes floatClouds {
      0% { transform: translateX(0); }
      100% { transform: translateX(120vw); }
    }

    .header {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }

    .text {
      font-size: 2.5em;
      color: #ffffff;
      letter-spacing: 1.5px;
      text-shadow:
        0 0 5px #ffffffaa,
        0 0 10px #a3d5ff,
        0 0 20px #89cfff,
        0 2px 8px rgba(0, 0, 0, 0.2);
      opacity: 0;
      animation: fadeUp 1.5s ease forwards;
    }

    .text.to {
      font-size: 2.2em;
      animation-delay: 1.8s;
    }

    @keyframes fadeUp {
      0% {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .start-btn {
      position: absolute;
      top: 300px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 36px;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(120deg, #6a11cb, #2575fc);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      opacity: 0;
      animation: fadeInBtn 1s ease forwards;
      animation-delay: 3.5s;
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    .start-btn::before {
      content: "";
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(270deg, #00f2fe, #4facfe, #00f2fe);
      background-size: 600% 600%;
      z-index: -1;
      border-radius: 14px;
      animation: borderFlow 5s linear infinite;
      filter: blur(8px);
    }

    .start-btn:hover {
      transform: translateX(-50%) scale(1.05);
      box-shadow: 0 0 18px rgba(79, 172, 254, 0.6);
    }

    @keyframes borderFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes fadeInBtn {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    /* LOADING BAR */
    .loading-container {
      position: absolute;
      top: 370px;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 20px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      display: none;
    }

    .loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, #00f2fe, #4facfe);
      position: relative;
      transition: width 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #loadingText {
      font-size: 14px;
      color: white;
      font-weight: bold;
      text-shadow: 0 0 3px #000;
      z-index: 2;
    }
  </style>
</head>
<body>

  <!-- MÂY -->
  <div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div>
  <div class="cloud cloud3"></div>

  <!-- CHỮ -->
  <div class="header">
    <div class="text welcome">Welcome</div>
    <div class="text to">To Bindz</div>
  </div>

  <!-- NÚT BẮT ĐẦU -->
  <button class="start-btn" onclick="startApp()">Bắt Đầu 😈</button>

  <!-- LOADING BAR -->
  <div class="loading-container" id="loadingContainer">
    <div class="loading-bar" id="loadingBar">
      <span id="loadingText">0%</span>
    </div>
  </div>

  <!-- SCRIPT -->
  <script>
    function startApp() {
      // Ẩn nút
      document.querySelector('.start-btn').style.display = 'none';

      // Hiện loading
      const bar = document.getElementById('loadingBar');
      const text = document.getElementById('loadingText');
      const container = document.getElementById('loadingContainer');
      container.style.display = 'block';

      let percent = 0;
      const interval = setInterval(() => {
        percent++;
        bar.style.width = percent + '%';
        text.textContent = percent + '%';
        if (percent >= 100) {
          clearInterval(interval);
          window.location.href = "result.html"; // ← Chuyển trang
        }
      }, 100); // 100ms x 100 = 10 giây
    }
  </script>

</body>
</html>
