<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome to Bindz</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    /* Nền xanh mây + mây bay */
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(to top, #a8edea, #fed6e3);
      background-size: 400% 400%;
      animation: cloudBG 20s ease infinite;
      font-family: 'Playfair Display', serif;
      overflow: hidden;
    }

    @keyframes cloudBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    /* Mây bay */
    .cloud {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      opacity: 0.4;
      animation: floatClouds 60s linear infinite;
    }

    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: #fff;
      border-radius: 50%;
    }

    .cloud1 {
      width: 200px;
      height: 60px;
      top: 100px;
      left: -250px;
      animation-delay: 0s;
    }

    .cloud2 {
      width: 150px;
      height: 50px;
      top: 200px;
      left: -200px;
      animation-delay: 20s;
    }

    .cloud3 {
      width: 250px;
      height: 70px;
      top: 300px;
      left: -300px;
      animation-delay: 40s;
    }

    .cloud::before {
      width: 100px;
      height: 100px;
      top: -25px;
      left: 25px;
    }

    .cloud::after {
      width: 120px;
      height: 120px;
      top: -40px;
      left: 90px;
    }

    @keyframes floatClouds {
      0% { transform: translateX(0); }
      100% { transform: translateX(120vw); }
    }

    /* Chữ đẹp đỉnh cao */
    .header {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }

    .text {
      font-size: 3em;
      color: #ffffff;
      letter-spacing: 1.5px;
      text-shadow:
        0 0 5px #ffffffaa,
        0 0 10px #a3d5ff,
        0 0 20px #89cfff,
        0 2px 8px rgba(0, 0, 0, 0.2);
      opacity: 0;
      animation: fadeUp 1.5s ease forwards;
    }

    .text.to {
      font-size: 2.5em;
      animation-delay: 1.8s;
    }

    @keyframes fadeUp {
      0% {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>
<body>

  <!-- Mây -->
  <div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div>
  <div class="cloud cloud3"></div>

  <!-- Chữ -->
  <div class="header">
    <div class="text welcome">Welcome</div>
    <div class="text to">To Bindz</div>
  </div>

</body>
</html>
