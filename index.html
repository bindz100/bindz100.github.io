<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome to Bindz</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }

    .welcome {
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%) translateY(-30px);
      font-size: 4em;
      color: #ffffff;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3), 0 4px 10px rgba(255,255,255,0.2);
      opacity: 0;
      animation: fadeSlideDown 2s ease-out forwards;
    }

    @keyframes fadeSlideDown {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(-30px);
      }
      100% {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="welcome">Welcome to Bindz</div>
</body>
</html>
