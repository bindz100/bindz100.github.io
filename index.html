<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>🌊 Welcome Wave</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      background: #0f2027;  /* fallback */
      overflow: hidden;
      font-family: 'Rubik Mono One', sans-serif;
    }

    /* Hiệu ứng sóng biển */
    body::before, body::after {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle at center, #00c6ff 0%, #0072ff 100%);
      animation: oceanWaves 20s linear infinite;
      z-index: -1;
      opacity: 0.4;
    }

    body::after {
      animation-delay: -10s;
      transform: rotate(180deg);
      opacity: 0.3;
    }

    @keyframes oceanWaves {
      0% { transform: rotate(0deg) scale(1.1); }
      100% { transform: rotate(360deg) scale(1.1); }
    }

    .welcome-text {
      display: flex;
      margin-top: 80px;
      gap: 10px;
      opacity: 0;
    }

    .welcome-text span {
      font-size: 60px;
      opacity: 0;
      animation: showChar 0.5s forwards, rainbowText 5s linear infinite;
      animation-delay: calc(var(--i) * 0.3s);
      background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 300%;
    }

    @keyframes showChar {
      0% { opacity: 0; transform: translateY(-30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes rainbowText {
      0% { background-position: 0%; }
      100% { background-position: 300%; }
    }
  </style>
</head>
<body>

  <div id="welcome" class="welcome-text">
    <span style="--i:0">W</span>
    <span style="--i:1">E</span>
    <span style="--i:2">L</span>
    <span style="--i:3">C</span>
    <span style="--i:4">O</span>
    <span style="--i:5">M</span>
    <span style="--i:6">E</span>
  </div>

  <script>
    // Delay xuất hiện chữ
    window.addEventListener("load", () => {
      document.getElementById("welcome").style.opacity = "1";
    });
  </script>

</body>
</html>
