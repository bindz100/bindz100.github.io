<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>🌈 Welcome</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: linear-gradient(270deg, #ff0000, #ff9900, #ffff00, #33cc33, #3399ff, #9900cc, #ff0066);
      background-size: 500% 500%;
      animation: bgMove 12s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Rubik Mono One', sans-serif;
      overflow: hidden;
      flex-direction: column;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .shine-circle {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, white, #00ffff, #9900ff);
      box-shadow: 0 0 50px rgba(255, 255, 255, 0.4);
      animation: float 4s ease-in-out infinite;
      position: absolute;
      top: 20%;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
    }

    .spinner {
      width: 90px;
      height: 90px;
      border: 6px solid rgba(255, 255, 255, 0.1);
      border-top: 6px solid white;
      border-radius: 50%;
      animation: spinOnce 2s ease-out forwards;
      margin-bottom: 30px;
    }

    @keyframes spinOnce {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); opacity: 0; }
    }

    .welcome-text {
      display: flex;
      gap: 10px;
      opacity: 0;
    }

    .welcome-text span {
      font-size: 60px;
      opacity: 0;
      animation: showChar 0.5s forwards, rainbowText 4s linear infinite;
      animation-delay: calc(var(--i) * 0.3s);
      background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 300%;
    }

    @keyframes showChar {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes rainbowText {
      0% { background-position: 0%; }
      100% { background-position: 300%; }
    }
  </style>
</head>
<body>

  <div class="shine-circle"></div>

  <div id="spinnerContainer" class="spinner"></div>

  <div id="welcome" class="welcome-text" style="display: none;">
    <span style="--i:0">W</span>
    <span style="--i:1">E</span>
    <span style="--i:2">L</span>
    <span style="--i:3">C</span>
    <span style="--i:4">O</span>
    <span style="--i:5">M</span>
    <span style="--i:6">E</span>
  </div>

  <script>
    // 2 giây sau vòng xoáy thì hiện WELCOME
    setTimeout(() => {
      document.getElementById("spinnerContainer").style.display = "none";
      const welcome = document.getElementById("welcome");
      welcome.style.display = "flex";
      welcome.style.opacity = "1";
    }, 2000);
  </script>

</body>
</html>
