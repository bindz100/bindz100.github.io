<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Welcome to Bindz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- ✅ CHẶN TRUY CẬP nếu không có key -->
  <script>
    const hashKey = location.hash.replace("#key=", "").trim();
    const validKey = "BINDZ-24H--shjwi188cbakajdb";

    if (hashKey === validKey) {
      localStorage.setItem("bindz_verified", "yes");
      history.replaceState(null, "", location.pathname); // ẩn hash
    }

    if (localStorage.getItem("bindz_verified") !== "yes") {
      document.write(`
        <style>
          body {
            background: black;
            color: white;
            font-family: sans-serif;
            text-align: center;
            padding-top: 100px;
          }
        </style>
        <body>
          <h1>🚫 Truy cập bị chặn</h1>
          <p>Bạn cần mở trang này từ <b>Phím tắt</b> (Shortcuts) có nhập đúng KEY.</p>
        </body>
      `);
      throw new Error("Người dùng chưa được xác thực.");
    }
  </script>

  <!-- Toàn bộ phần còn lại giữ nguyên -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@600&display=swap');
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;
    }

    body {
      height: 100vh;
      background: linear-gradient(-45deg, #91e5ff, #b3dfff, #e0f7ff, #a8dfff);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
      font-family: 'Quicksand', sans-serif;
      overflow: hidden;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .container {
      position: absolute;
      top: 10%;
      width: 100%;
      text-align: center;
      color: white;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    }

    .welcome, .to-bindz {
      opacity: 0;
      font-size: 40px;
      transition: opacity 1s ease;
    }

    .to-bindz {
      font-size: 32px;
      margin-top: 10px;
    }

    .show {
      opacity: 1;
    }

    .start-btn {
      display: none;
      margin: 50px auto;
      padding: 15px 40px;
      font-size: 20px;
      background: transparent;
      color: white;
      border: 3px solid white;
      border-radius: 10px;
      cursor: pointer;
      animation: glow 2s linear infinite;
      position: relative;
      touch-action: none;
    }

    @keyframes glow {
      0% { box-shadow: 0 0 5px #00fff7, 0 0 10px #00e5ff; }
      50% { box-shadow: 0 0 20px #00eaff, 0 0 30px #00ffff; }
      100% { box-shadow: 0 0 5px #00fff7, 0 0 10px #00e5ff; }
    }

    .progress-container {
      display: none;
      margin-top: 30px;
      width: 60%;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
      margin-left: auto;
      margin-right: auto;
    }

    .progress-bar {
      height: 30px;
      width: 0%;
      background: linear-gradient(to right, #00faff, #00ffe7);
      text-align: center;
      line-height: 30px;
      color: #000;
      font-weight: bold;
      font-family: 'Quicksand', sans-serif;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="welcome" id="welcome">Welcome</div>
    <div class="to-bindz" id="toBindz">to Bindz</div>
    <button class="start-btn" id="startBtn">Bắt Đầu 😈</button>

    <div class="progress-container" id="progressContainer">
      <div class="progress-bar" id="progressBar">0%</div>
    </div>
  </div>

  <script>
    // Hiện chữ Welcome -> to Bindz
    setTimeout(() => {
      document.getElementById('welcome').classList.add('show');
    }, 500);
    setTimeout(() => {
      document.getElementById('toBindz').classList.add('show');
    }, 1500);
    setTimeout(() => {
      document.getElementById('startBtn').style.display = 'inline-block';
    }, 2500);

    // Bắt đầu loading
    document.getElementById('startBtn').addEventListener('click', () => {
      document.getElementById('startBtn').style.display = 'none';
      const progressContainer = document.getElementById('progressContainer');
      const progressBar = document.getElementById('progressBar');
      progressContainer.style.display = 'block';

      let percent = 0;
      const interval = setInterval(() => {
        percent++;
        progressBar.style.width = percent + '%';
        progressBar.textContent = percent + '%';
        if (percent >= 100) {
          clearInterval(interval);
          window.location.href = 'vuot-link.html';
        }
      }, 100);
    });
  </script>
</body>
</html>
