<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Giả lập LED Vuông PEGA</title>
  <style>
    @font-face {
      font-family: 'DSDigital';
      src: url('https://cdn.jsdelivr.net/gh/fontsource/ds-digital/index.css');
    }
    body {
      margin:0;
      padding:0;
      background:linear-gradient(to bottom right,#0f2027,#203a43,#2c5364);
      font-family:sans-serif;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      flex-direction:column;
    }
    .dashboard {
      background:#111a20;
      padding:30px 50px;
      border-radius:20px;
      box-shadow:0 0 15px rgba(0,255,255,0.2);
      text-align:center;
      width:300px;
      font-family:sans-serif;
    }
    .dashboard h1 {
      margin:0;
      font-size:24px;
      color:#00ffe0;
      font-family:sans-serif;
    }
    .speed {
      font-size:64px;
      font-family:'DSDigital', monospace;
      margin:10px 0;
    }
    .unit {
      font-size:20px;
      font-family:sans-serif;
    }
    .info-row {
      display:flex;
      justify-content:space-between;
      margin-top:10px;
      font-size:18px;
    }
    .info-row .number {
      font-family:'DSDigital', monospace;
    }
    .controls {
      margin-top:30px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .gas, .toggle {
      padding:10px;
      font-size:18px;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }
    .gas {
      background:#009688;
      color:#fff;
    }
    .gas:active {
      background:#00796b;
    }
    .toggle {
      background:#333;
      color:#fff;
    }
  </style>
</head>
<body>

  <div class="dashboard">
    <h1>PEGA</h1>
    <div class="speed"><span id="speed">0</span> <span class="unit">km/h</span></div>
    <div class="info-row">
      <div>🔋 <span id="battery" class="number">100%</span></div>
      <div id="mode">Tiến</div>
    </div>
    <div class="info-row">
      <div id="clock">--:--</div>
      <div>ODO: <span id="odo" class="number">0</span> km</div>
    </div>
  </div>

  <div class="controls">
    <button class="gas"
      onmousedown="startGas()" onmouseup="stopGas()"
      ontouchstart="startGas()" ontouchend="stopGas()">Giữ để chạy 🚀</button>
    <button class="toggle" onclick="toggleMode()">Chuyển Tiến/Lùi</button>
  </div>

  <script>
    let speed=0,battery=100,odo=0,isGasHeld=false,isReverse=false,batteryTimer=0;
    const speedEl=document.getElementById('speed'),
          batteryEl=document.getElementById('battery'),
          modeEl=document.getElementById('mode'),
          odoEl=document.getElementById('odo'),
          clockEl=document.getElementById('clock');

    function updateClock(){
      const n=new Date(),h=String(n.getHours()).padStart(2,'0'),m=String(n.getMinutes()).padStart(2,'0');
      clockEl.textContent=`${h}:${m}`;
    }
    setInterval(updateClock,1000);updateClock();

    function startGas(){isGasHeld=true;}
    function stopGas(){isGasHeld=false;}
    function toggleMode(){isReverse=!isReverse;modeEl.textContent=isReverse?'Lùi':'Tiến';}

    setInterval(()=>{
      if(isGasHeld){
        isReverse ? (speed> -20 && speed--) : (speed<120 && speed++);
        odo+=0.01;
      } else {
        speed>0?speed--:speed<0 && speed++;
      }
      speedEl.textContent=Math.abs(speed);
      odoEl.textContent=odo.toFixed(2);
      batteryTimer++;
      if(batteryTimer>=1200){
        batteryTimer=0;
        battery>0 && battery--;
        batteryEl.textContent=battery+'%';
      }
    },100);
  </script>
</body>
</html>
