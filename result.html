<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bindz Key 24H</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Rubik Mono One', sans-serif;
      background: linear-gradient(135deg, #000000, #003344);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .glow {
      animation: glowText 2s infinite alternate;
    }

    @keyframes glowText {
      0% { text-shadow: 0 0 10px #0ff; }
      100% { text-shadow: 0 0 20px #0ff, 0 0 30px #0ff; }
    }

    .box {
      background: rgba(255, 255, 255, 0.05);
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(0,255,255,0.3);
      text-align: center;
      backdrop-filter: blur(6px);
      display: none;
    }

    .btn {
      padding: 12px 24px;
      font-size: 16px;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      background: #00ffee33;
      color: #0ff;
      cursor: pointer;
      font-family: 'Rubik Mono One', sans-serif;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00ffee55;
      color: #fff;
      box-shadow: 0 0 12px #0ff;
    }

    #keyInputOverlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #keyInputOverlay input {
      padding: 12px;
      font-size: 16px;
      width: 300px;
      text-align: center;
      border-radius: 8px;
      border: none;
      outline: none;
      margin-bottom: 20px;
      font-family: 'Rubik Mono One', sans-serif;
    }
  </style>
</head>
<body>
  <!-- Overlay để nhập key -->
  <div id="keyInputOverlay">
    <input id="keyInput" placeholder="Nhập key 24H vào đây..." />
    <button class="btn" onclick="checkKey()">🔓 Xác minh</button>
  </div>

  <!-- Nội dung chính -->
  <div class="box" id="mainContent">
    <h1 class="glow">🎉 Key của bạn:</h1>
    <div id="keyDisplay" style="font-size: 20px; margin-top: 10px;">BINDZ-24H--shjwi188cbakajdb</div>
    <button class="btn" onclick="copyKey()">📋 Sao chép key</button>
  </div>

  <script>
    const CORRECT_KEY = "BINDZ-24H--shjwi188cbakajdb";

    function checkKey() {
      const input = document.getElementById("keyInput").value.trim();
      if (input === CORRECT_KEY) {
        document.getElementById("keyInputOverlay").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
      } else {
        alert("❌ Sai key rồi! Vui lòng thử lại.");
      }
    }

    function copyKey() {
      const key = document.getElementById("keyDisplay").innerText;
      navigator.clipboard.writeText(key).then(() => {
        alert("📋 Đã sao chép key vào clipboard!");
      }).catch(() => {
        alert("⚠️ Không sao chép được. Dùng trình duyệt khác!");
      });
    }
  </script>
</body>
</html>
