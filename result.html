<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LED Góc Cứng – Segment7</title>
  <link href="https://fonts.cdnfonts.com/css/segment7" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
    body {
      height:100vh;
      background: linear-gradient(to bottom right, #0f2027, #203a43, #2c5364);
      display:flex; justify-content:center; align-items:center;
      font-family:'Segment7', monospace;
      color:#00ffcc;
    }
    .dashboard {
      background:#0b1a24;
      border-radius:12px;
      padding:40px;
      box-shadow:0 0 30px rgba(0,255,255,0.4);
      text-align:center;
    }
    .speed-box {
      border:4px solid #00ffe0;
      border-radius:4px;
      background:#000;
      display:inline-block;
      padding:10px 20px;
      font-size:60px;
      min-width:140px;
    }
    .unit { font-size:20px; margin-left:5px; }
    .info-row {
      display:flex; justify-content:space-between;
      margin-top:20px; font-size:20px;
    }
    .controls {
      margin-top:30px;
      display:flex; flex-direction:column; gap:15px;
    }
    button {
      padding:12px;
      font-size:18px;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }
    .gas { background:#009688; color:#fff; }
    .gas:active { background:#00796b; }
    .toggle { background:#333; color:#fff; }
  </style>
</head>
<body>
  <div class="dashboard">
    <h1 style="font-size:24px; margin-bottom:10px;">PEGA</h1>
    <div class="speed-box"><span id="speed">0</span><span class="unit">km/h</span></div>
    <div class="info-row">
      <div>🔋 <span id="battery">100%</span></div>
      <div id="mode">Tiến</div>
    </div>
    <div class="controls">
      <button class="gas" id="gasBtn">⏫ Kéo Ga</button>
      <button class="toggle" id="toggleBtn">Chuyển Tiến/Lùi</button>
    </div>
  </div>

  <script>
    let speed = 0,
        battery = 100,
        isPressed = false,
        isReverse = false;

    const speedEl = document.getElementById('speed'),
          batEl = document.getElementById('battery'),
          modeEl = document.getElementById('mode'),
          gasBtn = document.getElementById('gasBtn'),
          togg = document.getElementById('toggleBtn');

    gasBtn.addEventListener('mousedown', () => isPressed = true);
    gasBtn.addEventListener('touchstart', () => isPressed = true);

    window.addEventListener('mouseup', () => isPressed = false);
    window.addEventListener('touchend', () => isPressed = false);

    togg.addEventListener('click', () => {
      isReverse = !isReverse;
      modeEl.textContent = isReverse ? 'Lùi' : 'Tiến';
      if (isReverse && speed > 20) speed = 20;
    });

    setInterval(() => {
      if (isPressed) {
        let max = isReverse ? 20 : 99;
        if (speed < max) speed++;
      } else {
        if (speed > 0) speed--;
      }
      speedEl.textContent = speed;
    }, 100);

    setInterval(() => {
      if (battery > 0) {
        battery--;
        batEl.textContent = battery + '%';
      }
    }, 120000);
  </script>
</body>
</html>
