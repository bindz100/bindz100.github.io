<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kết quả - BINDZ VIP</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Rubik Mono One', sans-serif;
      background: radial-gradient(circle at center, #0f2027, #203a43, #2c5364);
      color: #00ffe0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .key-box {
      background: rgba(255, 255, 255, 0.05);
      padding: 40px 30px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 20px rgba(0,255,255,0.3);
      text-align: center;
      backdrop-filter: blur(6px);
      animation: fadeIn 1s ease-out;
    }

    .key-text {
      font-size: 18px;
      margin-bottom: 15px;
      color: #ffffffcc;
      text-shadow: 0 0 8px #00ffe0;
      animation: glow 2.5s infinite ease-in-out;
    }

    @keyframes glow {
      0%, 100% { text-shadow: 0 0 8px #00ffe0; }
      50% { text-shadow: 0 0 16px #00ffff; }
    }

    .key-code {
      font-size: 20px;
      background: rgba(0,255,255,0.1);
      padding: 12px 20px;
      border-radius: 12px;
      display: inline-block;
      margin-bottom: 20px;
      border: 2px dashed #00ffe0;
      user-select: all;
    }

    button.copy-btn {
      font-family: 'Rubik Mono One', sans-serif;
      background: #00ffe0;
      border: none;
      color: #000;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(0,255,255,0.4);
      transition: 0.3s;
    }

    button.copy-btn:hover {
      background: #00ffff;
      box-shadow: 0 0 25px #00ffff;
    }

    .lock-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid #00ffe0;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      color: #00ffe0;
      font-size: 18px;
      cursor: pointer;
      text-align: center;
      line-height: 38px;
      box-shadow: 0 0 12px rgba(0,255,255,0.3);
    }

    #key-input-area {
      margin-top: 20px;
      display: none;
    }

    input#key-input {
      padding: 10px;
      font-size: 14px;
      border: 1px solid #00ffe0;
      border-radius: 8px;
      background: #001;
      color: #0ff;
    }

    button#submit-key {
      margin-left: 10px;
      padding: 10px 16px;
      background: #0ff;
      color: #000;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: scale(0.95);}
      to {opacity: 1; transform: scale(1);}
    }
  </style>
</head>
<body>

  <button class="lock-btn" onclick="toggleKeyInput()">🔒</button>

  <div class="key-box">
    <div class="key-text">🎉 Mã truy cập 24h của bạn:</div>
    <div class="key-code" id="keyDisplay">BINDZ-24H--shjwi188cbakajdb</div><br/>
    <button class="copy-btn" onclick="copyKey()">📋 Sao chép</button>

    <div id="key-input-area">
      <input type="text" id="key-input" placeholder="Nhập key để xác minh">
      <button id="submit-key" onclick="checkKey()">Gửi</button>
    </div>
  </div>

  <script>
    const correctKey = "BINDZ-24H--shjwi188cbakajdb";

    function toggleKeyInput() {
      const inputArea = document.getElementById("key-input-area");
      inputArea.style.display = inputArea.style.display === "block" ? "none" : "block";
    }

    function copyKey() {
      const key = document.getElementById("keyDisplay").textContent;
      navigator.clipboard.writeText(key).then(() => {
        alert("✅ Đã sao chép mã!");
      });
    }

    function checkKey() {
      const input = document.getElementById("key-input").value.trim();
      if (input === correctKey) {
        alert("✅ Key đúng! Bạn đã xác minh thành công.");
      } else {
        alert("❌ Key sai, vui lòng thử lại.");
      }
    }
  </script>

</body>
</html>
