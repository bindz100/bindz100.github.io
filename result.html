<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Giả lập xe điện LED Vuông</title>
  <style>
    @font-face {
      font-family: 'DS-Digital';
      src: url('https://fonts.cdnfonts.com/s/14692/DS-DIGI.TTF') format('truetype');
    }
    * {
      user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;
    }
    body {
      margin:0;
      padding:0;
      background:linear-gradient(to bottom right,#0f2027,#203a43,#2c5364);
      font-family:sans-serif;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      flex-direction:column;
    }
    .dashboard {
      background:#111a20;
      padding:30px 50px;
      border-radius:20px;
      box-shadow:0 0 15px rgba(0,255,255,0.2);
      text-align:center;
      width:300px;
    }
    .dashboard h1 {
      margin:0;
      font-size:24px;
      color:#00ffe0;
    }
    .speed {
      font-size:64px;
      font-family:'DS-Digital', monospace;
      margin:10px 0;
    }
    .unit {
      font-size:20px;
    }
    .info-row {
      display:flex;
      justify-content:space-between;
      margin-top:10px;
      font-size:18px;
    }
    .info-row .number {
      font-family:'DS-Digital', monospace;
    }
    .controls {
      margin-top:30px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .gas, .toggle {
      padding:10px;
      font-size:18px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      touch-action: none;
    }
    .gas {
      background:#009688;
      color:#fff;
    }
    .gas:active {
      background:#00796b;
    }
    .toggle {
      background:#333;
      color:#fff;
    }
  </style>
</head>
<body>

  <div class="dashboard">
    <h1>PEGA</h1>
    <div class="speed"><span id="speed">0</span> <span class="unit">km/h</span></div>
    <div class="info-row">
      <div>🔋 <span id="battery" class="number">100%</span></div>
      <div id="mode">Tiến</div>
