<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Giả lập xe điện</title>
  <link href="https://fonts.cdnfonts.com/css/af-ledseg3" rel="stylesheet">
  <style>
    * {
      user-select: none;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background: linear-gradient(to bottom right, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    .dashboard {
      background: #111a20;
      padding: 30px 50px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
      text-align: center;
      width: 320px;
    }

    .dashboard h1 {
      margin: 0;
      font-size: 26px;
      color: #00ffe0;
      margin-bottom: 15px;
    }

    .speed {
      font-size: 64px;
      font-family: 'AF LEDSeg3', monospace;
      margin: 10px 0;
      letter-spacing: 4px;
    }

    .unit {
      font-size: 20px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
      margin-top: 10px;
    }

    .info-row .number {
      font-family: 'AF LEDSeg3', monospace;
    }

    .controls {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .slider-container {
      background: #004d40;
      border-radius: 10px;
      padding: 10px;
    }

    input[type="range"] {
      width: 100%;
      appearance: none;
      height: 16px;
      background: #00bfa5;
      border-radius: 8px;
      outline: none;
      transition: background 0.3s;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 30px;
      height: 30px;
      background: #ffffff;
      border: 3px solid #00bfa5;
      border-radius: 50%;
      cursor: grab;
    }

    .toggle {
      background: #333;
      color: white;
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }

    .toggle:hover {
      background: #555;
    }

    audio {
      display: none;
    }
  </style>
</head>
<body>

  <div class="dashboard">
    <h1>PEGA</h1>
    <div class="speed"><span id="speed">000</span> <span class="unit">km/h</span></div>
    <div class="info-row">
      <div>🔋 <span id="battery" class="number">100%</span></div>
      <div id="mode">Tiến</div>
    </div>
    <div class="controls">
      <div class="slider-container">
        <input type="range" id="gas" min="0" max="100" value="0">
      </div>
      <button class="toggle" id="toggleMode">Chuyển Tiến/Lùi</button>
    </div>
  </div>

  <audio id="engineSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_1c4ff328fc.mp3" loop></audio>

  <script>
    const speedDisplay = document.getElementById("speed");
    const batteryDisplay = document.getElementById("battery");
    const gas = document.getElementById("gas");
    const modeDisplay = document.getElementById("mode");
    const toggleButton = document.getElementById("toggleMode");
    const engineSound = document.getElementById("engineSound");

    let speed = 0;
    let battery = 100;
    let isReverse = false;
    let lastBatteryDrop = Date.now();

    toggleButton.onclick = () => {
      isReverse = !isReverse;
      modeDisplay.textContent = isReverse ? "Lùi" : "Tiến";
    };

    function updateSpeed() {
      const target = parseInt(gas.value);
      const maxSpeed = isReverse ? 20 : 139;
      const nextSpeed = Math.min(Math.round(target * maxSpeed / 100), maxSpeed);

      if (nextSpeed > 0 && engineSound.paused) {
        engineSound.play();
      } else if (nextSpeed === 0) {
        engineSound.pause();
        engineSound.currentTime = 0;
      }

      speed = nextSpeed;
      speedDisplay.textContent = speed.toString().padStart(3, '0');
    }

    function drainBattery() {
      if (Date.now() - lastBatteryDrop >= 120000 && battery > 0) {
        battery -= 1;
        lastBatteryDrop = Date.now();
        batteryDisplay.textContent = battery + "%";
      }
    }

    setInterval(() => {
      updateSpeed();
      drainBattery();
    }, 100);
  </script>
</body>
</html>
