<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Key 24H - Bindz</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Rubik Mono One', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,255,255,0.2), transparent 70%);
      border-radius: 50%;
      animation: pulse 5s infinite ease-in-out;
      z-index: 0;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(0.9); opacity: 0.3; }
      50% { transform: scale(1.1); opacity: 0.7; }
    }

    .box {
      z-index: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(0,255,255,0.3);
      text-align: center;
      backdrop-filter: blur(8px);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #00ffe0;
      text-shadow: 0 0 10px #00ffe0;
      animation: glowText 3s infinite ease-in-out;
    }

    @keyframes glowText {
      0%, 100% { text-shadow: 0 0 10px #00ffe0; }
      50% { text-shadow: 0 0 20px #00ffff; }
    }

    #keyDisplay {
      font-size: 20px;
      margin-top: 10px;
      padding: 12px 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      display: inline-block;
      color: #00ffff;
      text-shadow: 0 0 5px #00ffff;
      user-select: all;
      animation: popCount 1s infinite ease-in-out;
    }

    @keyframes popCount {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 16px;
      border: 2px solid #00ffe0;
      border-radius: 10px;
      background: rgba(0,255,255,0.1);
      color: #00ffe0;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Rubik Mono One', sans-serif;
      box-shadow: 0 0 15px rgba(0,255,255,0.3);
    }

    .btn:hover {
      background: rgba(0,255,255,0.2);
      color: #fff;
      box-shadow: 0 0 20px #00ffe0;
    }

    .lock-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 20px;
      background: rgba(255,255,255,0.1);
      border: 2px solid #00ffe0;
      border-radius: 50%;
      padding: 12px;
      cursor: pointer;
      color: #00ffe0;
      box-shadow: 0 0 10px #00ffe0;
      transition: 0.3s;
    }

    .lock-btn:hover {
      background: rgba(0,255,255,0.2);
    }

    #keySection {
      display: none;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="lock-btn" onclick="enterKey()">🔒</div>

  <div class="box">
    <h1>🔑 Mã truy cập 24H VIP</h1>
    <div id="keySection">
      <div id="keyDisplay">BINDZ-24H--shjwi188cbakajdb</div>
      <br>
      <button class="btn" onclick="copyKey()">📋 Sao chép key</button>
    </div>
  </div>

  <script>
    function enterKey() {
      const input = prompt("Nhập mã xác minh:");
      if (input === "BINDZ-24H--shjwi188cbakajdb") {
        document.getElementById("keySection").style.display = "block";
        alert("✅ Key hợp lệ!");
      } else {
        alert("❌ Key sai. Vui lòng thử lại.");
      }
    }

    function copyKey() {
      const key = document.getElementById("keyDisplay").innerText;
      navigator.clipboard.writeText(key).then(() => {
        alert("📋 Đã sao chép key!");
      });
    }
  </script>
</body>
</html>
