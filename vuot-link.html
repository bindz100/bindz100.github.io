<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Vượt Link Shader Style</title>
  <style>
    @keyframes shaderBackground {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1e3c72);
      background-size: 400% 400%;
      animation: shaderBackground 15s ease infinite;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 30px;
      text-shadow: 0 0 10px #00fff7, 0 0 20px #00c3ff;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #00b894;
      color: white;
      cursor: pointer;
      margin-top: 20px;
      transition: 0.3s;
      box-shadow: 0 0 10px #00ffc3;
    }

    button:hover {
      background: #019875;
      box-shadow: 0 0 15px #00ffc3, 0 0 25px #00fff7;
    }

    #countdown {
      font-size: 24px;
      margin-top: 15px;
    }

    span {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>⚡ Vui lòng thực hiện các bước để lấy mã ⚡</h1>
  
  <button id="btn1">Bấm để bắt đầu</button>
  <div id="countdown1" style="display:none;">Đợi <span id="timer1">64</span> giây...</div>

  <button id="btn2" style="display:none;">Bấm tiếp để hoàn tất</button>
  <div id="countdown2" style="display:none;">Đợi <span id="timer2">53</span> giây...</div>

  <script>
    const btn1 = document.getElementById('btn1');
    const btn2 = document.getElementById('btn2');
    const countdown1 = document.getElementById('countdown1');
    const countdown2 = document.getElementById('countdown2');
    const timer1 = document.getElementById('timer1');
    const timer2 = document.getElementById('timer2');

    btn1.onclick = () => {
      btn1.style.display = 'none';
      countdown1.style.display = 'block';
      let time1 = 64;
      const interval1 = setInterval(() => {
        time1--;
        timer1.textContent = time1;
        if (time1 <= 0) {
          clearInterval(interval1);
          countdown1.style.display = 'none';
          btn2.style.display = 'inline-block';
        }
      }, 1000);
    };

    btn2.onclick = () => {
      btn2.style.display = 'none';
      countdown2.style.display = 'block';
      let time2 = 53;
      const interval2 = setInterval(() => {
        time2--;
        timer2.textContent = time2;
        if (time2 <= 0) {
          clearInterval(interval2);
          window.location.href = 'result.html'; // 👉 thay bằng link nếu muốn
        }
      }, 1000);
    };
  </script>
</body>
</html>
